spring:
  application:
    name: java-crm
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
app:
  security:
    key: test-secret-key-for-testing-purposes-only-32chars
    recovery:
      cooldown: PT1M
      ttl: PT15M
