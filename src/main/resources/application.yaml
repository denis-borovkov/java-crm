spring:
  application:
    name: java-crm
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    name: java_crm
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
app:
  security:
    key: ${JWT_KEY}
    recovery:
      cooldown: PT1M
      ttl: PT15M